<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply — Your Last Hire</title>
  <meta name="description" content="Apply for your AI C-Suite. We deploy manually to ensure quality. Capacity is limited.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #050505;
      --bg-secondary: #0a0a0a;
      --bg-card: #0f0f0f;
      --text-primary: #f5f5f5;
      --text-secondary: #888888;
      --text-tertiary: #555555;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-active: rgba(255, 255, 255, 0.15);
      --accent-green: #00d4b4;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 9998;
      pointer-events: none; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }
    a { color: inherit; text-decoration: none; }

    /* Top bar */
    .topbar {
      padding: 24px 32px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border-subtle);
    }
    .topbar-brand {
      font-family: var(--font-mono);
      font-size: 0.7rem; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* Hero / headline */
    .apply-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 56px;
    }
    .apply-eyebrow {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-secondary);
      padding: 6px 14px;
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      margin: 0 auto 26px;
    }
    .apply-eyebrow-wrap {
      text-align: center;
    }
    .apply-headline {
      font-family: var(--font-sans);
      font-size: clamp(2.6rem, 6.5vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.035em;
      text-align: center;
      margin: 0 auto 18px;
      max-width: 14ch;
      color: var(--text-primary);
    }
    .apply-headline em {
      font-style: normal;
      font-family: var(--font-serif);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text-secondary);
    }
    .apply-sub {
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 480px;
      margin: 0 auto 56px;
      text-align: center;
    }

    /* Typeform container */
    .form-shell {
      position: relative;
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      background: var(--bg-card);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
      transition: border-color 0.3s;
    }
    .form-shell:hover {
      border-color: var(--border-active);
    }
    .form-shell-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(255, 255, 255, 0.02);
    }
    .form-shell-dots {
      display: flex; gap: 6px;
    }
    .form-shell-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }
    .form-shell-label {
      font-family: var(--font-mono);
      font-size: 0.62rem; font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .form-body {
      height: 540px;
      position: relative;
      display: flex;
    }
    .form-body > div,
    .form-body [data-tf-live] {
      flex: 1 1 auto;
      width: 100% !important;
      height: 100% !important;
      min-height: 100% !important;
    }
    .form-body iframe {
      width: 100% !important;
      height: 100% !important;
      min-height: 100% !important;
      border: none !important;
      display: block;
    }

    /* Footer note */
    .apply-footer-note {
      margin-top: 28px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-tertiary);
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .topbar { padding: 18px 20px; }
      .apply-wrap { padding: 48px 22px 64px; }
      .apply-eyebrow { font-size: 0.6rem; padding: 5px 12px; margin-bottom: 22px; }
      .apply-headline { font-size: clamp(2.4rem, 8vw, 3.4rem); max-width: 12ch; }
      .apply-sub { font-size: 0.95rem; margin-bottom: 40px; }
      .form-shell-header { padding: 12px 14px; }
      .form-body { height: 500px; }
    }
    @media (max-width: 480px) {
      .topbar { padding: 14px 16px; }
      .topbar-brand { font-size: 0.6rem; }
      .apply-wrap { padding: 36px 18px 40px; }
      .apply-eyebrow { font-size: 0.55rem; padding: 4px 11px; margin-bottom: 18px; }
      .apply-headline { font-size: 2.6rem; line-height: 1; letter-spacing: -0.035em; max-width: 12ch; margin-bottom: 14px; }
      .apply-sub { font-size: 0.88rem; margin-bottom: 32px; }
      .form-shell { border-radius: 12px; }
      .form-body { height: 480px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">YOUR LAST HIRE</div>
</div>

<main class="apply-wrap">
  <div class="apply-eyebrow-wrap"><div class="apply-eyebrow">APPLICATION</div></div>
  <h1 class="apply-headline">Apply Here.</h1>
  <p class="apply-sub">More copy coming soon.</p>

  <div class="form-shell" id="formShell">
    <div class="form-shell-header">
      <div class="form-shell-dots">
        <div class="form-shell-dot"></div>
        <div class="form-shell-dot"></div>
        <div class="form-shell-dot"></div>
      </div>
      <div class="form-shell-label">your-last-hire / application</div>
      <div></div>
    </div>
    <div class="form-body">
      <div data-tf-live="01KNK2YAVJ30JE764Y4E3RY6DE"></div>
    </div>
  </div>

  <div class="apply-footer-note">// Limited capacity. We respond within 24 hours.</div>
</main>

<script src="//embed.typeform.com/next/embed.js"></script>

</body>
</html>
